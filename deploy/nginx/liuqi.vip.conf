server {
	listen 80;
	listen [::]:80;
	server_name liuqi.vip www.liuqi.vip;

	root /srv/www/liuqi-site/current;
	index index.html;

	location /.well-known/acme-challenge/ {
		allow all;
	}

	location / {
		try_files $uri $uri/ =404;
	}

	location ~* \.(css|js|mjs|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
		expires 30d;
		add_header Cache-Control "public, max-age=2592000, immutable";
		try_files $uri =404;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name liuqi.vip www.liuqi.vip;

	root /srv/www/liuqi-site/current;
	index index.html;

	ssl_certificate /etc/letsencrypt/live/liuqi.vip/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/liuqi.vip/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	gzip on;
	gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

	location / {
		try_files $uri $uri/ =404;
	}

	location ~* \.(css|js|mjs|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
		expires 30d;
		add_header Cache-Control "public, max-age=2592000, immutable";
		try_files $uri =404;
	}
}